name: Build and deploy TypeScript server to Azure Web App - realprep

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install & build server
        run: |
          cd server
          npm install
          npm run build

      - name: Upload compiled server
        uses: actions/upload-artifact@v4
        with:
          name: server
          path: server

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: server

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9923F64493E246338E7A7989B2C1CBA8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6630AD0E2236446F9BD4AE41D42FCAF0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1BF8805C05254320A1A196FF25BEB1DE }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'realprep'
          slot-name: 'Production'
          package: .

